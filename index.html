<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D India Traffic Flow Visualization</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap');
  :root{--bg:#06080f;--panel:#0a0f1a;--border:#162030;--accent:#00e5ff;--text:#c8d8e8;--dim:#3a5060;--low:#00e5ff;--med:#ffd166;--high:#ff4d6d;}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--bg);color:var(--text);font-family:'Space Mono',monospace;height:100vh;overflow:hidden;display:flex;flex-direction:column;}

  header{display:flex;align-items:center;justify-content:space-between;padding:0 24px;height:58px;background:var(--panel);border-bottom:1px solid var(--border);flex-shrink:0;z-index:1000;}
  .logo{font-family:'Syne',sans-serif;font-weight:800;font-size:1.05rem;letter-spacing:.06em;color:var(--accent);display:flex;align-items:center;gap:10px;}
  .logo-dot{width:9px;height:9px;border-radius:50%;background:var(--accent);box-shadow:0 0 12px var(--accent);animation:pulse 2s infinite;}
  .logo-flag{font-size:1.2rem;}
  @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.3;transform:scale(.6)}}
  .header-stats{display:flex;gap:20px;}
  .stat{display:flex;flex-direction:column;align-items:flex-end;}
  .stat-label{color:var(--dim);font-size:.58rem;text-transform:uppercase;letter-spacing:.12em;}
  .stat-val{color:var(--accent);font-weight:700;font-size:.8rem;}

  .layout{display:flex;flex:1;overflow:hidden;}

  /* SIDEBAR */
  .sidebar{width:270px;background:var(--panel);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow-y:auto;flex-shrink:0;z-index:500;}
  .sidebar::-webkit-scrollbar{width:3px}.sidebar::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
  .section{padding:14px 16px;border-bottom:1px solid var(--border);}
  .section-title{font-family:'Syne',sans-serif;font-size:.6rem;font-weight:600;text-transform:uppercase;letter-spacing:.18em;color:var(--dim);margin-bottom:11px;}
  .time-display{font-family:'Syne',sans-serif;font-size:1.6rem;font-weight:800;color:var(--accent);text-align:center;margin-bottom:8px;text-shadow:0 0 20px rgba(0,229,255,.4);}
  input[type=range]{-webkit-appearance:none;width:100%;height:3px;background:var(--border);border-radius:2px;outline:none;cursor:pointer;}
  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:13px;height:13px;border-radius:50%;background:var(--accent);box-shadow:0 0 8px var(--accent);}
  .time-labels{display:flex;justify-content:space-between;font-size:.58rem;color:var(--dim);margin-top:5px;}
  .btn-row{display:flex;gap:7px;margin-top:11px;}
  .btn{flex:1;padding:7px;border:1px solid var(--border);background:transparent;color:var(--text);font-family:'Space Mono',monospace;font-size:.65rem;cursor:pointer;border-radius:3px;transition:all .2s;text-transform:uppercase;letter-spacing:.04em;}
  .btn:hover{border-color:var(--accent);color:var(--accent);}
  .btn.active{background:var(--accent);color:var(--bg);border-color:var(--accent);}

  .filter-item{display:flex;align-items:center;gap:9px;padding:5px 0;cursor:pointer;font-size:.72rem;}
  .filter-item input[type=checkbox]{display:none;}
  .check-box{width:13px;height:13px;border:1px solid var(--border);border-radius:2px;display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0;font-size:9px;color:var(--bg);}
  .filter-item input:checked+.check-box{background:var(--accent);border-color:var(--accent);}
  .filter-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}

  .legend-bar{height:7px;border-radius:4px;background:linear-gradient(to right,var(--low),var(--med),var(--high));margin:7px 0 4px;}
  .legend-labels{display:flex;justify-content:space-between;font-size:.58rem;color:var(--dim);}

  .city-btns{display:flex;flex-direction:column;gap:5px;}
  .city-btn{padding:7px 10px;border:1px solid var(--border);background:transparent;color:var(--text);font-family:'Space Mono',monospace;font-size:.65rem;cursor:pointer;border-radius:3px;transition:all .2s;text-align:left;}
  .city-btn:hover{border-color:var(--accent);color:var(--accent);}
  .city-btn.active{border-color:var(--accent);background:rgba(0,229,255,.08);color:var(--accent);}

  .road-list{display:flex;flex-direction:column;gap:3px;}
  .road-item{display:flex;align-items:center;justify-content:space-between;padding:5px 8px;border:1px solid var(--border);border-radius:3px;font-size:.62rem;cursor:pointer;transition:all .2s;}
  .road-item:hover{border-color:var(--accent);background:rgba(0,229,255,.04);}
  .road-item.selected{border-color:var(--accent);background:rgba(0,229,255,.1);}
  .road-name{color:var(--text);font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:140px;}
  .road-badge{padding:2px 5px;border-radius:8px;font-size:.58rem;font-weight:700;flex-shrink:0;}

  /* MAP */
  #map-container{flex:1;position:relative;overflow:hidden;}
  #map{width:100%;height:100%;}
  .leaflet-container{background:#06080f!important;}

  /* THREE.JS OVERLAY */
  #three-canvas{position:absolute;top:0;left:0;pointer-events:none;z-index:400;}

  .map-controls{position:absolute;top:12px;right:12px;z-index:600;display:flex;flex-direction:column;gap:5px;}
  .map-btn{width:36px;height:36px;background:var(--panel);border:1px solid var(--border);border-radius:5px;color:var(--text);font-size:.68rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;font-family:'Space Mono',monospace;}
  .map-btn:hover{border-color:var(--accent);color:var(--accent);}
  .map-btn.active{background:var(--accent);color:var(--bg);border-color:var(--accent);}

  .statusbar{height:26px;background:var(--panel);border-top:1px solid var(--border);display:flex;align-items:center;padding:0 16px;gap:18px;font-size:.58rem;color:var(--dim);flex-shrink:0;}
  .status-item{display:flex;gap:5px;align-items:center;}
  .status-dot{width:5px;height:5px;border-radius:50%;}

  /* TOOLTIP */
  .leaflet-tooltip{background:rgba(10,15,26,.97)!important;border:1px solid var(--accent)!important;border-radius:7px!important;color:var(--text)!important;font-family:'Space Mono',monospace!important;font-size:.68rem!important;padding:11px 14px!important;box-shadow:0 0 25px rgba(0,229,255,.25)!important;min-width:190px;}
  .leaflet-tooltip::before{border-top-color:var(--accent)!important;}
  .tt-title{font-family:'Syne',sans-serif;font-weight:700;font-size:.9rem;color:var(--accent);margin-bottom:7px;border-bottom:1px solid var(--border);padding-bottom:5px;}
  .tt-row{display:flex;justify-content:space-between;gap:14px;padding:2px 0;color:var(--dim);}
  .tt-row span:last-child{color:var(--text);font-weight:700;}
  .tt-bar-wrap{margin-top:7px;height:4px;background:var(--border);border-radius:2px;}
  .tt-bar{height:100%;border-radius:2px;transition:width .3s;}
</style>
</head>
<body>
<header>
  <div class="logo"><div class="logo-dot"></div><span class="logo-flag">🇮🇳</span>INDIA TRAFFLOW 3D</div>
  <div class="header-stats">
    <div class="stat"><span class="stat-label">Segments</span><span class="stat-val" id="seg-count">0</span></div>
    <div class="stat"><span class="stat-label">Avg Speed</span><span class="stat-val" id="avg-speed">—</span></div>
    <div class="stat"><span class="stat-label">Congested</span><span class="stat-val" id="congested-count">0</span></div>
    <div class="stat"><span class="stat-label">City</span><span class="stat-val" id="city-name">Mumbai</span></div>
  </div>
</header>

<div class="layout">
  <aside class="sidebar">
    <!-- TIME -->
    <div class="section">
      <div class="section-title">⏱ Time Window</div>
      <div class="time-display" id="time-display">08:00</div>
      <input type="range" id="time-slider" min="0" max="23" value="8" step="1" oninput="onSlider(this)">
      <div class="time-labels"><span>00:00</span><span>12:00</span><span>23:00</span></div>
      <div class="btn-row">
        <button class="btn" id="play-btn" onclick="togglePlay()">▶ Play</button>
        <button class="btn" onclick="resetTime()">↺ Reset</button>
      </div>
    </div>
    <!-- CITIES -->
    <div class="section">
      <div class="section-title">🏙 Select City</div>
      <div class="city-btns">
        <button class="city-btn active" onclick="switchCity('mumbai',this)">Mumbai – Maharashtra</button>
        <button class="city-btn" onclick="switchCity('delhi',this)">Delhi – NCR</button>
        <button class="city-btn" onclick="switchCity('bangalore',this)">Bengaluru – Karnataka</button>
        <button class="city-btn" onclick="switchCity('hyderabad',this)">Hyderabad – Telangana</button>
        <button class="city-btn" onclick="switchCity('varanasi',this)">Varanasi – UP</button>
      </div>
    </div>
    <!-- FILTER -->
    <div class="section">
      <div class="section-title">🔍 Traffic Filter</div>
      <label class="filter-item"><input type="checkbox" id="f-low" checked onchange="renderRoads()"><div class="check-box">✓</div><div class="filter-dot" style="background:var(--low)"></div><span>Low &lt; 40%</span></label>
      <label class="filter-item"><input type="checkbox" id="f-med" checked onchange="renderRoads()"><div class="check-box">✓</div><div class="filter-dot" style="background:var(--med)"></div><span>Medium 40–70%</span></label>
      <label class="filter-item"><input type="checkbox" id="f-high" checked onchange="renderRoads()"><div class="check-box">✓</div><div class="filter-dot" style="background:var(--high)"></div><span>High &gt; 70%</span></label>
    </div>
    <!-- LEGEND -->
    <div class="section">
      <div class="section-title">📊 Intensity Scale</div>
      <div class="legend-bar"></div>
      <div class="legend-labels"><span>Free Flow</span><span>Moderate</span><span>Congested</span></div>
    </div>
    <!-- 3D TOGGLE -->
    <div class="section">
      <div class="section-title">🧊 3D View</div>
      <div class="btn-row">
        <button class="btn active" id="btn-3d" onclick="toggle3D()">3D Bars ON</button>
        <button class="btn active" id="btn-hm" onclick="toggleHeatmap()">Heatmap ON</button>
      </div>
    </div>
    <!-- ROADS -->
    <div class="section">
      <div class="section-title">🛣 Road Segments</div>
      <div class="road-list" id="road-list"></div>
    </div>
  </aside>

  <div id="map-container">
    <div id="map"></div>
    <canvas id="three-canvas"></canvas>
    <div class="map-controls">
      <button class="map-btn" onclick="map.zoomIn()" title="Zoom In">+</button>
      <button class="map-btn" onclick="map.zoomOut()" title="Zoom Out">−</button>
    </div>
  </div>
</div>

<div class="statusbar">
  <div class="status-item"><div class="status-dot" style="background:var(--accent);box-shadow:0 0 6px var(--accent)"></div><span>LIVE SIMULATION</span></div>
  <div class="status-item"><span id="status-time">Time: 08:00</span></div>
  <div class="status-item"><span id="hover-info">Hover a road segment for details</span></div>
</div>

// ── External GeoJSON Loading ──
// Attempts to load city GeoJSON from external files.
// Falls back to hardcoded data if files are not found.
const CITY_KEYS = ['mumbai','delhi','bangalore','hyderabad','varanasi'];
let geojsonLoaded = 0;

function tryLoadGeoJSON(city){
  fetch(city + '.geojson')
    .then(res => {
      if(!res.ok) throw new Error('Not found');
      return res.json();
    })
    .then(data => {
      // Merge GeoJSON features with existing hourly data
      // Expects GeoJSON features to have properties: name, type, hourly (array), coordinates
      data.features.forEach((gf, i) => {
        const props = gf.properties || {};
        const coords = gf.geometry && gf.geometry.coordinates
          ? (gf.geometry.type === 'LineString' ? gf.geometry.coordinates : gf.geometry.coordinates)
          : null;
        if(i < CITIES[city].features.length){
          // Override coords from GeoJSON if available
          if(coords) CITIES[city].features[i].coords = coords;
          if(props.name) CITIES[city].features[i].name = props.name;
          if(props.type) CITIES[city].features[i].type = props.type;
          if(props.hourly) CITIES[city].features[i].hourly = props.hourly;
        } else {
          // Append new features from GeoJSON
          CITIES[city].features.push({
            name: props.name || ('Road ' + i),
            type: props.type || 'collector',
            hourly: props.hourly || new Array(24).fill(50),
            coords: coords || []
          });
        }
      });
      console.log('[GeoJSON] Loaded ' + city + '.geojson (' + data.features.length + ' features)');
    })
    .catch(() => {
      console.log('[GeoJSON] ' + city + '.geojson not found, using built-in data.');
    })
    .finally(() => {
      geojsonLoaded++;
      if(geojsonLoaded === CITY_KEYS.length) renderRoads();
    });
}

let currentCity = 'mumbai';
let currentHour = 8, playing = false, playInterval = null;
let show3D = true, showHeatmap = true, selectedFeature = null;
const polylines = [], heatCircles = [];

// ── helpers ──
function iColor(v){return v<40?'#00e5ff':v<70?'#ffd166':'#ff4d6d';}
function iLabel(v){if(v<40)return{text:'LOW',bg:'rgba(0,40,60,.9)',color:'#00e5ff'};if(v<70)return{text:'MED',bg:'rgba(50,35,10,.9)',color:'#ffd166'};return{text:'HIGH',bg:'rgba(60,10,20,.9)',color:'#ff4d6d'};}
function speed(v){return Math.max(5, 80-Math.round(v*.65));}

// ── Leaflet ──
const map = L.map('map',{center:[19.076,72.877],zoom:13,zoomControl:false,attributionControl:false});
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{opacity:.88}).addTo(map);

// ── Three.js ──
const canvas3d = document.getElementById('three-canvas');
let renderer, scene3d, camera3d, bars3d=[], animFrame=0;

function initThree(){
  const mc = document.getElementById('map-container');
  canvas3d.width = mc.clientWidth;
  canvas3d.height = mc.clientHeight;
  renderer = new THREE.WebGLRenderer({canvas:canvas3d,alpha:true,antialias:true});
  renderer.setSize(canvas3d.width,canvas3d.height);
  renderer.setClearColor(0x000000,0);
  scene3d = new THREE.Scene();
  camera3d = new THREE.PerspectiveCamera(60, canvas3d.width/canvas3d.height, 0.01, 100);
  camera3d.position.z=1.4;
  scene3d.add(camera3d);
  const amb=new THREE.AmbientLight(0xffffff,.5); scene3d.add(amb);
  const dir=new THREE.DirectionalLight(0x00e5ff,.9); dir.position.set(1,2,1); scene3d.add(dir);
  const dir2=new THREE.DirectionalLight(0xff4d6d,.4); dir2.position.set(-1,-1,1); scene3d.add(dir2);
}

function latlngToNDC(lat,lng){
  const pt = map.latLngToContainerPoint([lat,lng]);
  const w=canvas3d.width, h=canvas3d.height;
  return new THREE.Vector2((pt.x/w)*2-1,-((pt.y/h)*2-1));
}

function render3DBars(){
  bars3d.forEach(b=>scene3d.remove(b)); bars3d=[];
  if(!show3D||!renderer) return;
  const feats = CITIES[currentCity].features;
  const fL=document.getElementById('f-low').checked;
  const fM=document.getElementById('f-med').checked;
  const fH=document.getElementById('f-high').checked;
  feats.forEach(feat=>{
    const v=feat.hourly[currentHour];
    const lbl=iLabel(v);
    if(lbl.text==='LOW'&&!fL)return;
    if(lbl.text==='MED'&&!fM)return;
    if(lbl.text==='HIGH'&&!fH)return;
    const mid=feat.coords[Math.floor(feat.coords.length/2)];
    const pos=latlngToNDC(mid[1],mid[0]);
    const h=(v/100)*0.2;
    const geo=new THREE.BoxGeometry(0.022,h,0.010);
    const col=new THREE.Color(iColor(v));
    const mat=new THREE.MeshPhongMaterial({color:col,transparent:true,opacity:.82,emissive:col,emissiveIntensity:.35,shininess:80});
    const bar=new THREE.Mesh(geo,mat);
    bar.position.set(pos.x,pos.y+h/2,0);
    bar.userData={baseH:h,idx:bars3d.length};
    scene3d.add(bar); bars3d.push(bar);
  });
  renderFrame();
}

function renderFrame(){
  if(!renderer)return;
  // reposition bars on map pan/zoom
  const feats=CITIES[currentCity].features;
  const fL=document.getElementById('f-low').checked;
  const fM=document.getElementById('f-med').checked;
  const fH=document.getElementById('f-high').checked;
  let bi=0;
  feats.forEach(feat=>{
    const v=feat.hourly[currentHour];
    const lbl=iLabel(v);
    if(lbl.text==='LOW'&&!fL)return;
    if(lbl.text==='MED'&&!fM)return;
    if(lbl.text==='HIGH'&&!fH)return;
    if(bi>=bars3d.length)return;
    const bar=bars3d[bi++];
    const mid=feat.coords[Math.floor(feat.coords.length/2)];
    const pos=latlngToNDC(mid[1],mid[0]);
    const h=bar.userData.baseH;
    bar.position.set(pos.x,pos.y+h/2,0);
  });
  renderer.render(scene3d,camera3d);
}

map.on('move zoom moveend zoomend',()=>{if(show3D)renderFrame();});

// ── Animate bars ──
function animate(){
  requestAnimationFrame(animate);
  animFrame++;
  if(show3D&&bars3d.length){
    bars3d.forEach((bar,i)=>{
      bar.rotation.y=Math.sin(animFrame*.025+i*.7)*.08;
      bar.material.emissiveIntensity=.2+Math.sin(animFrame*.04+i*.5)*.18;
    });
    renderer&&renderer.render(scene3d,camera3d);
  }
}

// ── Render roads ──
function renderRoads(){
  polylines.forEach(p=>map.removeLayer(p)); polylines.length=0;
  heatCircles.forEach(c=>map.removeLayer(c)); heatCircles.length=0;
  const feats=CITIES[currentCity].features;
  const fL=document.getElementById('f-low').checked;
  const fM=document.getElementById('f-med').checked;
  const fH=document.getElementById('f-high').checked;
  let totSpd=0,cong=0,cnt=0;
  feats.forEach((feat,idx)=>{
    const v=feat.hourly[currentHour];
    const col=iColor(v); const lbl=iLabel(v);
    if(lbl.text==='LOW'&&!fL)return;
    if(lbl.text==='MED'&&!fM)return;
    if(lbl.text==='HIGH'&&!fH)return;
    const coords=feat.coords.map(c=>[c[1],c[0]]);
    const spd=speed(v); totSpd+=spd; cnt++; if(lbl.text==='HIGH')cong++;
    const wt=feat.type==='highway'?6:feat.type==='arterial'?4:2.5;
    const pl=L.polyline(coords,{color:col,weight:wt,opacity:.92});
    pl.on('mouseover',()=>{
      document.getElementById('hover-info').textContent=feat.name+' | '+spd+' km/h | '+v+'% intensity';
      pl.setStyle({weight:wt+4,opacity:1});
    });
    pl.on('mouseout',()=>{
      document.getElementById('hover-info').textContent='Hover a road segment for details';
      pl.setStyle({weight:wt,opacity:.92});
    });
    pl.on('click',()=>selectRoad(idx));
    pl.bindTooltip(
      '<div><div class="tt-title">'+feat.name+'</div>'+
      '<div class="tt-row"><span>Type</span><span>'+feat.type+'</span></div>'+
      '<div class="tt-row"><span>Speed</span><span>'+spd+' km/h</span></div>'+
      '<div class="tt-row"><span>Intensity</span><span style="color:'+col+'">'+v+'%</span></div>'+
      '<div class="tt-row"><span>Status</span><span style="color:'+col+'">'+lbl.text+'</span></div>'+
      '<div class="tt-row"><span>Hour</span><span>'+String(currentHour).padStart(2,'0')+':00</span></div>'+
      '<div class="tt-bar-wrap"><div class="tt-bar" style="width:'+v+'%;background:'+col+'"></div></div>'+
      '</div>',
      {permanent:false,direction:'top',sticky:true}
    );
    pl.addTo(map); polylines.push(pl);
    if(showHeatmap){
      coords.forEach(pt=>{
        const c=L.circle(pt,{radius:v*12,fillColor:col,fillOpacity:.1,color:col,opacity:.04,weight:1}).addTo(map);
        heatCircles.push(c);
      });
    }
  });
  document.getElementById('seg-count').textContent=cnt;
  document.getElementById('avg-speed').textContent=cnt?Math.round(totSpd/cnt)+' km/h':'--';
  document.getElementById('congested-count').textContent=cong;
  if(show3D)render3DBars();
  else{bars3d.forEach(b=>scene3d&&scene3d.remove(b));bars3d=[];renderer&&renderer.clear();}
  updateRoadList();
}

function updateRoadList(){
  const list=document.getElementById('road-list'); list.innerHTML='';
  CITIES[currentCity].features.forEach((feat,idx)=>{
    const v=feat.hourly[currentHour]; const lbl=iLabel(v);
    const el=document.createElement('div');
    el.className='road-item'+(selectedFeature===idx?' selected':'');
    el.innerHTML='<span class="road-name">'+feat.name+'</span><span class="road-badge" style="background:'+lbl.bg+';color:'+lbl.color+'">'+lbl.text+' '+v+'%</span>';
    el.onclick=()=>selectRoad(idx); list.appendChild(el);
  });
}

function selectRoad(idx){
  selectedFeature=(selectedFeature===idx)?null:idx;
  if(selectedFeature!==null){
    const feat=CITIES[currentCity].features[idx];
    const lats=feat.coords.map(c=>c[1]),lngs=feat.coords.map(c=>c[0]);
    map.fitBounds([[Math.min(...lats),Math.min(...lngs)],[Math.max(...lats),Math.max(...lngs)]],{padding:[80,80]});
  }
  updateRoadList();
}

function switchCity(city,btn){
  currentCity=city; selectedFeature=null;
  document.querySelectorAll('.city-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('city-name').textContent=btn.textContent.split('–')[0].trim();
  const c=CITIES[city];
  map.setView(c.center,c.zoom,{animate:true});
  setTimeout(renderRoads,300);
}

function onSlider(el){currentHour=parseInt(el.value);updateTimeDisplay();renderRoads();}
function updateTimeDisplay(){
  const h=String(currentHour).padStart(2,'0');
  document.getElementById('time-display').textContent=h+':00';
  document.getElementById('status-time').textContent='Time: '+h+':00';
}
function togglePlay(){
  playing=!playing; const btn=document.getElementById('play-btn');
  if(playing){btn.textContent='⏸ Pause';btn.classList.add('active');playInterval=setInterval(()=>{currentHour=(currentHour+1)%24;document.getElementById('time-slider').value=currentHour;updateTimeDisplay();renderRoads();},800);}
  else{btn.textContent='▶ Play';btn.classList.remove('active');clearInterval(playInterval);}
}
function resetTime(){currentHour=8;document.getElementById('time-slider').value=8;updateTimeDisplay();renderRoads();if(playing)togglePlay();}
function toggle3D(){
  show3D=!show3D;
  const btn=document.getElementById('btn-3d');
  btn.textContent=show3D?'3D Bars ON':'3D Bars OFF';
  btn.classList.toggle('active',show3D);
  renderRoads();
}
function toggleHeatmap(){
  showHeatmap=!showHeatmap;
  const btn=document.getElementById('btn-hm');
  btn.textContent=showHeatmap?'Heatmap ON':'Heatmap OFF';
  btn.classList.toggle('active',showHeatmap);
  renderRoads();
}

// resize
window.addEventListener('resize',()=>{
  const mc=document.getElementById('map-container');
  canvas3d.width=mc.clientWidth; canvas3d.height=mc.clientHeight;
  if(renderer)renderer.setSize(canvas3d.width,canvas3d.height);
  if(camera3d){camera3d.aspect=canvas3d.width/canvas3d.height;camera3d.updateProjectionMatrix();}
  if(show3D)render3DBars();
});

// ── INIT ──
window.addEventListener('load',()=>{
  initThree();
  animate();
  // Try loading external GeoJSON for each city (falls back to built-in data)
  CITY_KEYS.forEach(city => tryLoadGeoJSON(city));
});
</script>
